name: Erdos Autoresearch Skill CI

on:
  push:
    branches: ["main"]
    paths:
      - "skills/erdos-autoresearch/**"
      - "tests/**"
      - "README.md"
      - ".github/workflows/erdos-autoresearch-skill.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "skills/erdos-autoresearch/**"
      - "tests/**"
      - "README.md"
      - ".github/workflows/erdos-autoresearch-skill.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: erdos-autoresearch-skill-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v9
        with:
          version: "0.11.29"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Validate Agent Skills specification
        run: >-
          uvx --from "skills-ref==0.1.1"
          agentskills validate skills/erdos-autoresearch

      - name: Run skill doctor
        run: >-
          uv run --no-project
          skills/erdos-autoresearch/scripts/skill_doctor.py
          --skill-dir skills/erdos-autoresearch

      - name: Validate schemas and OpenAI metadata
        run: |
          uv run --no-project --with "jsonschema==4.25.1" --with "pyyaml==6.0.3" \
            python -c 'import json; from pathlib import Path; import yaml; from jsonschema.validators import validator_for; root=Path("skills/erdos-autoresearch"); [validator_for(json.loads(path.read_text())).check_schema(json.loads(path.read_text())) for path in (root / "references" / "schemas").glob("*.json")]; yaml.safe_load((root / "agents" / "openai.yaml").read_text())'

      - name: Lint Python
        run: uvx ruff@0.12.12 check skills/erdos-autoresearch/scripts tests

      - name: Run deterministic and cross-agent installer tests
        env:
          BUN_INSTALL_CACHE_DIR: /tmp/bun-install-cache
          PYTHONDONTWRITEBYTECODE: "1"
        run: uv run --no-project -m unittest discover -s tests -v
